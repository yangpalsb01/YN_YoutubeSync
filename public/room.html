<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JukeSync — 방</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="room-page">

  <div class="noise"></div>

  <!-- Hidden YouTube player -->
  <div id="yt-player-wrap" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;">
    <div id="yt-player"></div>
  </div>

  <!-- Top bar -->
  <header class="room-header">
    <a href="/" class="logo logo--sm">
      <span class="logo-icon">♪</span>
      <span class="logo-text">JukeSync</span>
    </a>
    <div class="room-info">
      <h1 class="room-name" id="room-name">...</h1>
      <div class="room-meta">
        <span class="badge" id="host-badge" style="display:none;">🎛 호스트</span>
        <button class="code-badge" id="copy-code" title="코드 복사">코드: <strong id="room-code">...</strong></button>
        <button class="btn btn--sm btn--ghost" id="copy-link-btn">🔗 링크 복사</button>
      </div>
    </div>
    <div class="room-header-right">
      <span class="nickname-display" id="my-nickname"></span>
    </div>
  </header>

  <!-- Player bar (host only visible controls) -->
  <div class="player-bar" id="player-bar">
    <div class="now-playing">
      <div class="now-playing-art" id="now-playing-art">♪</div>
      <div class="now-playing-info">
        <p class="now-playing-title" id="now-playing-title">재생 중인 곡 없음</p>
        <p class="now-playing-sub" id="now-playing-sub">—</p>
      </div>
    </div>

    <div class="player-controls" id="player-controls">
      <button class="ctrl-btn" id="btn-shuffle" title="셔플">⇄</button>
      <button class="ctrl-btn" id="btn-prev" title="이전">⏮</button>
      <button class="ctrl-btn ctrl-btn--main" id="btn-playpause" title="재생/일시정지">▶</button>
      <button class="ctrl-btn" id="btn-next" title="다음">⏭</button>
      <button class="ctrl-btn" id="btn-repeat" title="반복">↻</button>
    </div>

    <div class="player-volume">
      <span class="vol-icon">🔊</span>
      <input type="range" id="volume-slider" min="0" max="100" value="80" class="vol-slider" />
      <span class="vol-label" id="vol-label">80</span>
    </div>
  </div>

  <!-- Guest player bar (no controls) -->
  <div class="player-bar player-bar--guest hidden" id="player-bar-guest">
    <div class="now-playing">
      <div class="now-playing-art" id="guest-art">♪</div>
      <div class="now-playing-info">
        <p class="now-playing-title" id="guest-title">재생 중인 곡 없음</p>
        <p class="now-playing-sub" id="guest-sub">호스트의 제어를 기다리는 중...</p>
      </div>
    </div>
    <div class="guest-status">
      <span id="guest-playing-icon">⏸</span>
      <span style="font-size:0.8rem;color:var(--text-muted);">호스트가 제어 중</span>
    </div>
  </div>

  <!-- Main content -->
  <div class="room-layout">

    <!-- Sidebar: Playlists -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">플레이리스트</h2>
        <button class="btn btn--icon" id="add-playlist-btn" title="플레이리스트 추가">+</button>
      </div>

      <div id="playlist-list" class="playlist-list">
        <!-- Playlists rendered here -->
      </div>

      <!-- Standalone queue -->
      <div class="queue-section">
        <div class="queue-header" id="queue-header">
          <span>📋 개별 대기열</span>
          <button class="btn btn--icon" id="add-queue-song-btn" title="대기열에 곡 추가">+</button>
        </div>
        <div id="queue-list" class="song-list song-list--queue">
          <!-- queue songs -->
        </div>
      </div>
    </aside>

    <!-- Chat log / activity -->
    <section class="chat-section">
      <div class="chat-log" id="chat-log"></div>
    </section>

  </div>

  <!-- Add Song Modal -->
  <div class="modal hidden" id="add-song-modal">
    <div class="modal-box">
      <h3 id="add-song-modal-title">곡 추가</h3>
      <input type="url" id="yt-url-input" class="input" placeholder="YouTube 링크 붙여넣기..." />
      <p class="form-hint">예: https://www.youtube.com/watch?v=...</p>
      <div id="add-song-preview" class="song-preview hidden"></div>
      <div class="modal-actions">
        <button class="btn btn--primary" id="add-song-confirm">추가</button>
        <button class="btn btn--ghost" id="add-song-cancel">취소</button>
      </div>
    </div>
  </div>

  <!-- Add Playlist Modal -->
  <div class="modal hidden" id="add-playlist-modal">
    <div class="modal-box">
      <h3>플레이리스트 만들기</h3>
      <input type="text" id="new-playlist-name" class="input" placeholder="플레이리스트 이름..." maxlength="30" />
      <div class="modal-actions">
        <button class="btn btn--primary" id="create-playlist-confirm">만들기</button>
        <button class="btn btn--ghost" id="create-playlist-cancel">취소</button>
      </div>
    </div>
  </div>

  <!-- Move Song Modal -->
  <div class="modal hidden" id="move-song-modal">
    <div class="modal-box">
      <h3>곡 이동</h3>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1rem;">이동할 위치를 선택하세요</p>
      <div id="move-target-list" class="move-target-list"></div>
      <div class="modal-actions">
        <button class="btn btn--ghost" id="move-song-cancel">취소</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/room.js"></script>
</body>
</html>
