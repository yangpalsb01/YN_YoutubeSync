<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JukeSync</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="room-page">

  <!-- Hidden YouTube player -->
  <div style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;">
    <div id="yt-player"></div>
  </div>

  <!-- Top bar -->
  <header class="room-header">
    <a href="/" class="logo logo--sm">
      <span class="logo-icon">♪</span>
      <span class="logo-text">JukeSync</span>
    </a>

    <div class="room-info">
      <!-- Editable room name (host only) -->
      <div class="room-name-wrap" id="room-name-wrap">
        <span class="room-name" id="room-name" title="클릭하여 이름 변경">...</span>
        <span class="room-name-hint" id="room-name-hint" style="display:none;">✏️</span>
      </div>

      <div class="room-meta">
        <span class="badge" id="host-badge" style="display:none;">🎛 호스트</span>
        <button class="code-badge" id="copy-code">코드: <strong id="room-code">...</strong></button>
        <button class="btn btn--sm btn--ghost" id="copy-link-btn">🔗 링크 복사</button>
        <button class="btn btn--sm btn--danger" id="delete-room-btn" style="display:none;">🗑 방 삭제</button>
      </div>
    </div>

    <div class="room-header-right">
      <span class="nickname-display" id="my-nickname"></span>
    </div>
  </header>

  <!-- Host player bar -->
  <div class="player-bar" id="player-bar" style="display:none;">
    <div class="player-bar-top">
      <div class="now-playing">
        <div class="now-playing-art" id="now-playing-art">♪</div>
        <div class="now-playing-info">
          <p class="now-playing-title" id="now-playing-title">재생 중인 곡 없음</p>
          <p class="now-playing-sub" id="now-playing-sub">—</p>
        </div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btn-shuffle" title="셔플">⇄</button>
        <button class="ctrl-btn" id="btn-prev" title="이전">⏮</button>
        <button class="ctrl-btn ctrl-btn--main" id="btn-playpause">▶</button>
        <button class="ctrl-btn" id="btn-next" title="다음">⏭</button>
        <button class="ctrl-btn" id="btn-repeat" title="반복">↻</button>
      </div>
      <div class="player-volume">
        <span class="vol-icon">🔊</span>
        <input type="range" id="volume-slider" min="0" max="100" value="80" class="vol-slider" />
        <span class="vol-label" id="vol-label">80</span>
      </div>
    </div>
    <div class="player-bar-timeline">
      <span class="timeline-time" id="time-current">0:00</span>
      <input type="range" id="timeline-slider" min="0" max="100" value="0" step="0.1" class="timeline-slider" />
      <span class="timeline-time" id="time-duration">0:00</span>
    </div>
  </div>

  <!-- Guest player bar (removed - info shown in big card below) -->

  <!-- Main layout -->
  <div class="room-layout">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">플레이리스트</span>
        <button class="btn btn--icon" id="add-playlist-btn" title="플레이리스트 추가">＋</button>
      </div>

      <div id="playlist-list" class="playlist-list"></div>

      <!-- Standalone queue -->
      <div class="queue-section">
        <div class="queue-header">
          <span>개별 대기열</span>
          <button class="btn btn--icon" id="add-queue-song-btn" title="곡 추가">＋</button>
        </div>
        <div id="queue-list" class="song-list song-list--queue"></div>
      </div>
    </aside>

    <section class="chat-section" id="chat-section">
      <div class="chat-section-header">활동 로그</div>
      <div class="chat-log" id="chat-log"></div>
    </section>

    <!-- Guest view: only shows current song -->
    <div class="guest-main" id="guest-main" style="display:none;">
      <div class="guest-now-playing-card">
        <p class="guest-label">지금 재생 중</p>
        <div class="guest-big-art" id="guest-big-art">♪</div>
        <p class="guest-big-title" id="guest-big-title">재생 중인 곡 없음</p>
        <p class="guest-big-ch" id="guest-big-ch">—</p>
        <div class="guest-playing-anim" id="guest-anim" style="display:none;">
          <span></span><span></span><span></span><span></span>
        </div>
        <!-- Guest local volume control -->
        <div class="guest-volume-wrap">
          <span class="vol-icon">🔊</span>
          <input type="range" id="guest-volume-slider" min="0" max="100" value="80" class="vol-slider" />
          <span class="vol-label" id="guest-vol-label">80</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Add Song Modal -->
  <div class="modal hidden" id="add-song-modal">
    <div class="modal-box">
      <h3 id="add-song-modal-title">곡 추가</h3>
      <input type="url" id="yt-url-input" class="input" placeholder="YouTube 링크 붙여넣기..." />
      <p class="form-hint">예: https://www.youtube.com/watch?v=...</p>
      <div id="add-song-preview" class="song-preview hidden"></div>
      <div id="song-title-wrap" class="song-title-edit hidden">
        <label class="field-label">곡 이름</label>
        <input type="text" id="custom-title-input" class="input" placeholder="곡 이름..." maxlength="100" />
        <div class="song-memo-edit">
          <label class="field-label">메모 <span style="color:var(--text-light);font-weight:400;">(선택)</span></label>
          <input type="text" id="custom-memo-input" class="input" placeholder="짧은 메모를 입력하세요..." maxlength="80" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn--primary" id="add-song-confirm">추가</button>
        <button class="btn btn--ghost" id="add-song-cancel">취소</button>
      </div>
    </div>
  </div>

  <!-- Add Playlist Modal -->
  <div class="modal hidden" id="add-playlist-modal">
    <div class="modal-box">
      <h3>플레이리스트 만들기</h3>
      <input type="text" id="new-playlist-name" class="input" placeholder="플레이리스트 이름..." maxlength="30" />
      <div class="modal-actions">
        <button class="btn btn--primary" id="create-playlist-confirm">만들기</button>
        <button class="btn btn--ghost" id="create-playlist-cancel">취소</button>
      </div>
    </div>
  </div>

  <!-- Move Song Modal -->
  <div class="modal hidden" id="move-song-modal">
    <div class="modal-box">
      <h3>곡 이동</h3>
      <p style="color:var(--text-muted);font-size:0.87rem;margin-bottom:1rem;">이동할 위치를 선택하세요</p>
      <div id="move-target-list" class="move-target-list"></div>
      <div class="modal-actions">
        <button class="btn btn--ghost" id="move-song-cancel">취소</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/room.js"></script>
</body>
</html>
